<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070d" />
    <title>Reset Password - PhoneShop GH</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-512.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div class="auth-wrap">
      <div class="auth-visual" style="background-image: url('/images/hero-login.jpg')">
        <div class="content">
          <div class="brand">
            <div class="brand-logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="3" />
                <line x1="12" y1="18" x2="12" y2="18" />
              </svg>
            </div>
            <div>
              <div class="brand-name">PhoneShop GH</div>
              <div class="brand-sub">Set a new password</div>
            </div>
          </div>
          <h1>Choose a new password.</h1>
          <p>Enter the reset token and a new password. The token expires in 15 minutes.</p>
        </div>
      </div>

      <div class="auth-form-wrap">
        <form id="rpForm" class="auth-form glass-strong">
          <h2>Reset password</h2>
          <p class="subtitle">Set a new password for your account</p>

          <div id="alert" class="alert alert-error hidden"></div>
          <div id="success" class="alert alert-success hidden"></div>

          <div class="field">
            <label for="token">Reset token</label>
            <input id="token" name="token" type="text" required autocomplete="off" />
          </div>
          <div class="field">
            <label for="newPassword">New password (min 6 chars)</label>
            <input id="newPassword" name="newPassword" type="password" required minlength="6" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6" autocomplete="new-password" />
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            Update password
          </button>

          <div class="auth-footer">
            <a href="/index.html">Back to sign in</a>
          </div>
        </form>
      </div>
    </div>

    <script src="/app.js"></script>
    <script>
      const url = new URL(location.href);
      const fromQuery = url.searchParams.get("token");
      const fromSession = sessionStorage.getItem("resetToken");
      if (fromQuery) document.getElementById("token").value = fromQuery;
      else if (fromSession) document.getElementById("token").value = fromSession;

      const form = document.getElementById("rpForm");
      const alertEl = document.getElementById("alert");
      const successEl = document.getElementById("success");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        alertEl.classList.add("hidden");
        successEl.classList.add("hidden");
        const token = document.getElementById("token").value.trim();
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        if (newPassword !== confirmPassword) {
          alertEl.textContent = "Passwords do not match";
          alertEl.classList.remove("hidden");
          return;
        }
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span><span>Updating...</span>';
        try {
          const res = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPassword }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Reset failed");
          sessionStorage.removeItem("resetToken");
          successEl.innerHTML = "<strong>Password updated.</strong><br/>Redirecting to sign in...";
          successEl.classList.remove("hidden");
          setTimeout(() => {
            location.href = "/index.html";
          }, 1500);
        } catch (err) {
          alertEl.textContent = err.message;
          alertEl.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Update password";
        }
      });
    </script>
  </body>
</html>
