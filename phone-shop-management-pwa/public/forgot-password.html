<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070d" />
    <title>Forgot Password - PhoneShop GH</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-512.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div class="auth-wrap">
      <div class="auth-visual" style="background-image: url('/images/hero-login.jpg')">
        <div class="content">
          <div class="brand">
            <div class="brand-logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="3" />
                <line x1="12" y1="18" x2="12" y2="18" />
              </svg>
            </div>
            <div>
              <div class="brand-name">PhoneShop GH</div>
              <div class="brand-sub">Account recovery</div>
            </div>
          </div>
          <h1>Recover access to your account.</h1>
          <p>
            Enter the email linked to your account. If you configured a
            security question, you'll need to answer it to receive your reset
            token.
          </p>
        </div>
      </div>

      <div class="auth-form-wrap">
        <form id="fpForm" class="auth-form glass-strong">
          <h2>Forgot password</h2>
          <p class="subtitle">We'll generate a reset token for you</p>

          <div id="alert" class="alert alert-error hidden"></div>
          <div id="success" class="alert alert-success hidden"></div>

          <div class="field">
            <label for="email">Account email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>

          <div id="secField" class="field hidden">
            <label for="securityAnswer" id="secLabel">Security answer</label>
            <input id="securityAnswer" name="securityAnswer" type="text" autocomplete="off" />
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            Get reset token
          </button>

          <div class="auth-footer">
            Remember it? <a href="/index.html">Back to sign in</a>
          </div>
        </form>
      </div>
    </div>

    <script src="/app.js"></script>
    <script>
      const form = document.getElementById("fpForm");
      const alertEl = document.getElementById("alert");
      const successEl = document.getElementById("success");
      const secField = document.getElementById("secField");
      const secLabel = document.getElementById("secLabel");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        alertEl.classList.add("hidden");
        successEl.classList.add("hidden");
        const email = document.getElementById("email").value.trim();
        const securityAnswer = document.getElementById("securityAnswer").value;
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span><span>Working...</span>';
        try {
          const res = await fetch("/api/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, securityAnswer }),
          });
          const data = await res.json();
          if (!res.ok) {
            if (data.error === "security_answer_required") {
              secField.classList.remove("hidden");
              secLabel.textContent = data.securityQuestion || "Security answer";
              alertEl.textContent = "Please answer your security question to continue.";
              alertEl.classList.remove("hidden");
              return;
            }
            throw new Error(data.error || "Request failed");
          }
          if (data.resetToken) {
            // Store the token temporarily so reset page can pick it up
            sessionStorage.setItem("resetToken", data.resetToken);
            successEl.innerHTML =
              "<strong>Reset token ready.</strong><br/>Token: <code style='user-select:all'>" +
              data.resetToken +
              "</code><br/><small>Click below to reset your password.</small>";
            successEl.classList.remove("hidden");
            setTimeout(() => {
              location.href = "/reset-password.html?token=" + encodeURIComponent(data.resetToken);
            }, 2200);
          } else {
            successEl.textContent = data.message || "If the account exists, instructions have been sent.";
            successEl.classList.remove("hidden");
          }
        } catch (err) {
          alertEl.textContent = err.message;
          alertEl.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Get reset token";
        }
      });
    </script>
  </body>
</html>
